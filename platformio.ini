; ============================================================================
;  StickSat - cut-down CardSat satellite tracker for the M5StickC Plus 1.1
; ============================================================================
;  Target: M5Stack M5StickC Plus 1.1 (ESP32-PICO-D4, 4 MB flash, NO PSRAM,
;          ~520 KB SRAM, 135x240 ST7789 LCD, buttons A/B/C, passive buzzer,
;          AXP192 PMU).
;
;  Build:   pio run
;  Flash:   pio run -t upload
;  Monitor: pio device monitor -b 115200
; ----------------------------------------------------------------------------

[env:m5stickc-plus]
platform        = espressif32
board           = m5stick-c              ; PlatformIO id for the StickC / StickC Plus (ESP32-PICO)
framework       = arduino
monitor_speed   = 115200
upload_speed    = 1500000

; 4 MB flash: single app slot + a large LittleFS data region for the GP cache,
; per-satellite transponder caches, config and the satellite list. We ship an
; explicit CSV (rather than a named table) so the flashed layout is unambiguous.
board_build.partitions = partitions_4mb.csv
board_build.filesystem = littlefs

; NOTE: the PICO-D4 has NO PSRAM, so BOARD_HAS_PSRAM is deliberately NOT set.
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DARDUINOJSON_USE_DOUBLE=1

lib_deps =
    m5stack/M5Unified @ ^0.2.7           ; pulls in M5GFX; auto-detects the StickC Plus
    bblanchon/ArduinoJson @ ^7.1.0
    ; SGP4 propagation + pass prediction for Arduino/ESP32:
    https://github.com/Hopperpop/Sgp4-Library.git

; If button/display detection misbehaves on an older M5Unified, pin git master:
;   lib_deps = https://github.com/m5stack/M5Unified.git
